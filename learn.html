<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a2535">
<title>New Horse Player? Start Here — GiddyUp</title>
<style>
  :root{
    --navy:#1a2535; --navy2:#2d3f55; --gold:#c9a84c; --goldLight:#f0d080; --goldDark:#8a6d1f;
    --cream:#f5f0e8; --paper:#fffdf8; --border:#e2ddd0; --text:#1a2535; --muted:#495164;
    --win:#1e783c; --place:#c41e28; --show:#1e3aaa;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;background:linear-gradient(160deg,var(--cream) 0%,#faf7f0 50%,#f3ede0 100%);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding-bottom:60px}

  /* Header */
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:28px 20px 22px;text-align:center;position:relative}
  header .word{font-size:15px;letter-spacing:1px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:6px}
  header .word b{color:var(--gold)}
  header h1{margin:0 0 8px;font-size:24px;color:#fff;line-height:1.3;font-weight:900}
  header h1 span{color:var(--gold)}
  header p{margin:0;font-size:13px;color:rgba(255,255,255,0.75);font-style:italic;max-width:380px;margin:0 auto}
  .backlink{display:inline-block;margin-top:16px;font-size:12px;color:var(--gold);text-decoration:none;border:1px solid rgba(201,168,76,0.5);border-radius:20px;padding:6px 16px}

  /* Tabs */
  .tabbar{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:2px solid var(--gold)}
  .tabrow{display:flex}
  .tabrow.row2{border-top:1px solid var(--border)}
  .tabbtn{flex:1;padding:13px 6px 11px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;text-align:center}
  .tabbtn.active{color:var(--navy);border-bottom-color:var(--gold);background:rgba(201,168,76,0.08)}

  .panel{padding:22px 18px 8px}
  .panel h2{font-size:24px;font-weight:900;color:var(--navy);margin:0 0 8px;line-height:1.25}
  .panel .sub{font-size:15px;color:var(--muted);margin:0 0 20px;line-height:1.55;font-weight:500}

  .card{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px}
  .card h3{font-size:16px;margin:0 0 6px;color:var(--navy);font-weight:800}
  .card p{font-size:14.5px;line-height:1.62;margin:0;color:var(--text)}
  .card p+p{margin-top:8px}

  .betrow{display:flex;align-items:center;gap:12px}
  .betchip{flex-shrink:0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#fff}

  .example{background:rgba(201,168,76,0.10);border:1.5px dashed var(--gold);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:14px;color:var(--navy);line-height:1.55}
  .example b{color:var(--navy)}

  /* Tote board */
  .tote{background:#0a0f0a;border-radius:16px;padding:22px 18px;text-align:center;box-shadow:inset 0 0 30px rgba(0,0,0,0.6);margin-bottom:16px}
  .tote .label{font-family:Georgia,serif;font-size:10px;letter-spacing:3px;color:#7a9e7a;text-transform:uppercase;margin-bottom:10px}
  .tote .odds-display{font-family:'Courier New',monospace;font-size:42px;font-weight:700;color:#ffb020;text-shadow:0 0 12px rgba(255,176,32,0.7);letter-spacing:2px}
  .tote .payout{font-family:'Courier New',monospace;font-size:15px;color:#7ee787;margin-top:8px;letter-spacing:1px}
  .oddsgrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .oddsbtn{flex:1 0 30%;padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--navy);font-weight:700;font-size:13px;cursor:pointer;font-family:'Courier New',monospace}
  .oddsbtn.active{border-color:var(--gold);background:rgba(201,168,76,0.15);color:var(--navy)}

  .steplist{counter-reset:step}
  .step{display:flex;gap:12px;margin-bottom:14px}
  .step .num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--navy);color:var(--gold);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .step .txt{font-size:14.5px;line-height:1.6;padding-top:2px;color:var(--text)}

  .quote{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:14px;padding:20px 18px;color:#fff;text-align:center;margin:16px 0}
  .quote .q{font-size:16px;font-style:italic;font-weight:700;color:var(--gold);line-height:1.4}

  .cta{display:block;text-align:center;padding:14px;background:linear-gradient(135deg,var(--gold),var(--goldLight));border-radius:12px;color:var(--navy);font-weight:900;font-size:15px;text-decoration:none;margin-top:6px}
  .qrbox{background:#fff;border:2px solid var(--gold);border-radius:14px;padding:18px;text-align:center;margin-bottom:16px}
  .qrbox .qr{width:140px;height:140px;margin:0 auto 10px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:11px;font-weight:700;line-height:1.4}

  .footer-note{text-align:center;font-size:11px;color:var(--muted);padding:24px 20px 0}

  .taglabel{display:inline-block;font-size:13.5px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--goldDark);margin-bottom:12px}

  /* Rules */
  .rulecard{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:14px;padding:18px 18px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start}
  .rulecard .rnum{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center}
  .rulecard .rtext{color:#fff;font-size:14.5px;line-height:1.55;font-weight:600;padding-top:4px}
  .rulecard.echo{background:rgba(26,37,53,0.06);border:1.5px dashed var(--navy2)}
  .rulecard.echo .rtext{color:var(--navy);font-style:italic}
  .rulecard.echo .rnum{background:var(--navy);color:var(--gold)}

  .glossrow{display:flex;gap:12px;margin-bottom:10px}
  .glossbadge{flex-shrink:0;width:64px;height:64px;border-radius:10px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);font-size:10px;font-weight:800;text-align:center;display:flex;align-items:center;justify-content:center;line-height:1.3;padding:4px}

  /* Q&A */
  .qlabel{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--goldDark);margin-bottom:5px}
  .qtext{font-size:16.5px;font-weight:900;color:var(--navy);margin-bottom:10px;line-height:1.4}
  .alabel{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}

  .colorgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
  .colorpill{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.02);border:1px solid var(--border);border-radius:8px;padding:7px 10px}
  .colorswatch{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,0.15)}
  .colorpill span{font-size:13px;font-weight:700;color:var(--text)}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="word">Giddy<b>Up</b></div>
    <h1>New Horse Player? <span>Start Here.</span></h1>
    <p>&ldquo;We do the numbers. You enjoy the race.&rdquo;</p>
    <a class="backlink" href="index.html">&larr; Back to the App</a>
  </header>

  <div class="tabbar" id="tabbar"></div>
  <div class="panel" id="panel"></div>

</div>

<script>
const TABS = [
  {id:"intro", label:"Welcome"},
  {id:"bets", label:"Bets & Odds"},
  {id:"wicket", label:"Buy Your Ticket"},
  {id:"basics", label:"Race Basics"},
  {id:"yours", label:"Make It Yours"},
  {id:"start", label:"Get Started"}
];

function chip(color, text){
  return `<div class="betchip" style="background:${color}">${text}</div>`;
}

const RENDER = {

  intro(){
    return `
      <div class="taglabel">Welcome</div>
      <h2 style="font-size:28px;line-height:1.2;margin-bottom:10px">Three Rules Before You Start</h2>
      <p style="font-size:17px;font-weight:800;color:var(--navy);line-height:1.5;margin:0 0 20px">Everything else on this page is optional.<br>These three aren't.</p>

      <div class="rulecard">
        <div class="rnum">1</div>
        <div class="rtext">Enjoy the races and enjoy the company you're with. You've already won.</div>
      </div>
      <div class="rulecard echo">
        <div class="rnum">2</div>
        <div class="rtext">Having an unlucky day? Reread Rule 1.</div>
      </div>
      <div class="rulecard echo">
        <div class="rnum">3</div>
        <div class="rtext">Having a lucky day? Reread Rule 1.</div>
      </div>

      <div class="taglabel" style="margin-top:24px">How a Day Works</div>
      <h2>The Procedure</h2>
      <p class="sub">Step 1 happens once. Then repeat steps 2–5 for every race.</p>

      <div class="steplist">
        <div class="step"><div class="num">1</div><div class="txt">Buy a program and/or load giddyup.app on your phone — just once, at the start of your day</div></div>
        <div class="step"><div class="num">2</div><div class="txt">Review the race</div></div>
        <div class="step"><div class="num">3</div><div class="txt">Pick your winner</div></div>
        <div class="step"><div class="num">4</div><div class="txt">Buy your ticket</div></div>
        <div class="step"><div class="num">5</div><div class="txt">Cash in your winnings — hopefully!</div></div>
      </div>
      <div class="example"><b>Next race up?</b> Jump straight back to step 2. No need to buy another program or reload the app — you're set for the day.</div>

      <div class="taglabel" style="margin-top:24px">Before You Bet</div>
      <h2>Beginner Tips</h2>
      <p class="sub">The habits that keep a day at the races fun, not costly.</p>

      <div class="steplist">
        <div class="step"><div class="num">1</div><div class="txt">Stick to Win, Place, and Show at first — see the Bets & Odds tab for what each means. Exacta, Trifecta, and Superfecta can wait.</div></div>
        <div class="step"><div class="num">2</div><div class="txt">Never chase a loss. If a bet doesn't hit, don't bet bigger next race trying to win it back — that's exactly how a bad afternoon turns into a bad week.</div></div>
        <div class="step"><div class="num">3</div><div class="txt">Start small — $2 bets, Win/Place/Show only, until you've got a feel for how races actually unfold.</div></div>
        <div class="step"><div class="num">4</div><div class="txt">Trust the Rankings tab. GiddyUp's default ranking is a strong starting point — you don't need to touch Angles yet.</div></div>
        <div class="step"><div class="num">5</div><div class="txt">It's okay to skip a race. You don't have to bet every single one just because you're at the track — some races just don't have a clear read, and passing is a real skill.</div></div>
        <div class="step"><div class="num">6</div><div class="txt">Set a daily limit before you start, and stick to it no matter what. Until you've got a feel for things, $2 a race is plenty.</div></div>
        <div class="step"><div class="num">7</div><div class="txt">Keep a diary. A quick note after each race — even just "liked the winner, ignored my own pick" — and patterns start showing up fast.</div></div>
      </div>
    `;
  },

  bets(){
    return `
      <div class="taglabel">The Basics</div>
      <h2>Bet Types & Odds</h2>
      <p class="sub">Start simple. Every bet below is built on picking a horse — the only thing that changes is how exact you have to be.</p>

      <div class="card"><div class="betrow">${chip('#1e783c','W')}<div><h3>Win</h3><p>Your horse has to finish 1st. Simplest bet on the board.</p></div></div></div>
      <div class="card"><div class="betrow">${chip('#1e3aaa','P')}<div><h3>Place</h3><p>Your horse finishes 1st or 2nd. Lower payout, easier to hit.</p></div></div></div>
      <div class="card"><div class="betrow">${chip('#c41e28','S')}<div><h3>Show</h3><p>Your horse finishes 1st, 2nd, or 3rd. The safest of the three.</p></div></div></div>

      <div class="card">
        <h3>🎯 Exacta</h3>
        <p>Pick the 1st and 2nd place finishers, in the exact order. Harder to hit, bigger payout.</p>
      </div>
      <div class="card">
        <h3>🎯 Trifecta</h3>
        <p>Pick 1st, 2nd, and 3rd, in exact order. Even bigger payout, even harder to hit.</p>
      </div>
      <div class="card">
        <h3>🎯 Superfecta</h3>
        <p>Pick 1st through 4th, in exact order. The big swing bet.</p>
        <div class="example"><b>Boxing tip:</b> A "box" covers every order of finish for your horses. Box 3 horses in a Trifecta and you win if they finish 1-2-3 in <i>any</i> order — costs more, but removes the guesswork on order.</div>
      </div>

      <div class="taglabel" style="margin-top:24px">Understanding</div>
      <h2>How Odds Work</h2>
      <p class="sub">Odds are just the crowd's opinion, priced in dollars. Tap a number below to see what a $2 win bet actually pays.</p>

      <div class="tote">
        <div class="label">$2 Win Payout</div>
        <div class="odds-display" id="oddsDisplay">5-1</div>
        <div class="payout" id="payoutDisplay">PAYS $12.00</div>
      </div>

      <div class="oddsgrid" id="oddsGrid"></div>

      <div class="card">
        <h3>What the number means</h3>
        <p>5-1 means for every $1 you bet, you profit $5 if you win — plus you get your original $1 back. So a $2 bet at 5-1 returns $12 total: $10 profit + your $2 stake.</p>
      </div>
      <div class="card">
        <h3>Favorites vs. longshots</h3>
        <p>Low odds (like 2-5) mean the crowd expects that horse to win — small payout. High odds (like 20-1) mean the crowd doesn't — big payout if it does.</p>
      </div>
      <div class="card">
        <h3>Odds keep moving</h3>
        <p>Morning line odds are just a starting guess. The real odds shift right up until post time as more money comes in on each horse — your actual payout isn't locked until the gates open.</p>
      </div>
    `;
  },

  basics(){
    const colors = [
      ["1","#c41e28","Red"],["2","#ffffff","White"],["3","#1e3aaa","Blue"],
      ["4","#e6c81e","Yellow"],["5","#1e783c","Green"],["6","#1a1a1a","Black"],
      ["7","#e6781e","Orange"],["8","#e66ea0","Pink"],["9","#1ec8c8","Turquoise"],
      ["10","#7a1ea0","Purple"],["11","#9e9e9e","Gray"],["12","#9ed61e","Lime"]
    ];
    const colorHtml = colors.map(([n,hex,name])=>
      `<div class="colorpill"><div class="colorswatch" style="background:${hex}"></div><span>#${n} ${name}</span></div>`
    ).join("");

    return `
      <div class="taglabel">Glossary</div>
      <h2>Race Basics</h2>
      <p class="sub">A few things every newcomer eventually asks — might as well know them now.</p>

      <div class="card">
        <div class="qlabel">Q</div>
        <div class="qtext">What do the horse numbers mean?</div>
        <div class="alabel">A</div>
        <p>Nothing about ability. The number on a horse's saddle cloth is its post position, drawn at random before the race. It only tells you which starting gate the horse breaks from — don't read anything into a horse being #1 versus #9.</p>
      </div>

      <div class="card">
        <div class="qlabel">Q</div>
        <div class="qtext">What colors does each post position wear?</div>
        <div class="alabel">A</div>
        <p>Post positions follow a standard color code, so you can spot a horse by color from a distance, not just by number:</p>
        <div class="colorgrid">${colorHtml}</div>
      </div>

      <div class="card">
        <div class="qlabel">Q</div>
        <div class="qtext">What types of races are there?</div>
        <div class="alabel">A</div>
        <p><b>Maiden</b> — horses that have never won. Thin form, less predictable.</p>
        <p><b>Claiming</b> — horses entered "for sale" at a set price; any licensed owner can claim them after the race. The most common class, wide range of ability.</p>
        <p><b>Allowance</b> — horses that have won before but aren't for sale (non-claiming) and haven't reached stakes company yet.</p>
        <p><b>Stakes</b> — the top level. Biggest purses, best horses, the marquee races on the card.</p>
      </div>

      <div class="card">
        <div class="qlabel">Q</div>
        <div class="qtext">What's a furlong, and what's a Sprint vs. a Route?</div>
        <div class="alabel">A</div>
        <p>A <b>furlong</b> is 1/8 of a mile (220 yards). Races are measured in furlongs up to about a mile, then in miles beyond that — a "6 furlong" race is 3/4 of a mile.</p>
        <p><b>Sprint</b> — shorter races, roughly up to 7 furlongs. Early speed matters most; there's less time to make up ground.</p>
        <p><b>Route</b> — longer races, one mile or more. Pace and stamina matter more — a horse held back early often has more left in the stretch.</p>
      </div>

      <div class="card">
        <div class="qlabel">Q</div>
        <div class="qtext">What has GiddyUp already done for me?</div>
        <div class="alabel">A</div>
        <p>By the time you open the Rankings tab, every horse in the field has already been analyzed and ranked by past performance — weighted by whichever Angle profile you're using (Stakes, Allowance, Claiming, Maiden, or your own custom DNA). You're not starting from a blank program. You're starting from a ranked list and deciding if you agree.</p>
      </div>
    `;
  },

  wicket(){
    return `
      <div class="taglabel">Etiquette</div>
      <h2>Buy Your Ticket</h2>
      <p class="sub">There's a line behind you. Knowing your bet before you step up keeps things moving for everyone — including you.</p>

      <div class="card">
        <h3>Know before you go</h3>
        <p>Decide your race number, bet type, dollar amount, and horse number(s) <i>before</i> you're standing at the window.</p>
        <div class="example"><b>Say it like this:</b> "Race 3, $2 Exacta, 4-7."</div>
      </div>

      <div class="steplist">
        <div class="step"><div class="num">1</div><div class="txt">Track (if the venue runs more than one)</div></div>
        <div class="step"><div class="num">2</div><div class="txt">Race number</div></div>
        <div class="step"><div class="num">3</div><div class="txt">Dollar amount</div></div>
        <div class="step"><div class="num">4</div><div class="txt">Bet type</div></div>
        <div class="step"><div class="num">5</div><div class="txt">Horse number(s)</div></div>
      </div>

      <div class="card">
        <h3>A few more things</h3>
        <p>Have cash ready — some wickets and terminals prefer it. Step aside to check your ticket and count change instead of doing it at the window. And know whether you're at a live teller or a self-serve terminal before you're in line — the process is a little different for each.</p>
      </div>

      <div class="card">
        <h3>💰 Cashing in? Have your next bet ready too</h3>
        <p>If you're cashing a winning ticket, decide your next race's picks before you get to the window. You can cash your winner and place your next bet in the same trip — saves you a second trip through the line.</p>
      </div>
    `;
  },

  yours(){
    return `
      <div class="taglabel">The Philosophy</div>
      <h2>Make It Yours</h2>
      <p class="sub">This is the part that actually makes racing fun.</p>

      <div class="card">
        <h3>Pick your own winner</h3>
        <p>Don't just copy someone else's bet. The thrill of racing is in making the call yourself and watching it play out — win or lose, it's yours.</p>
      </div>

      <div class="card">
        <h3>Nobody bats 1.000</h3>
        <p>Everyone's an expert when they're on a winning streak. Funny how quiet they get on a losing one. Never pay someone for a "lock" — build your own process instead.</p>
      </div>

      <div class="quote">
        <div class="q">"Build your own process.<br>That's what makes it yours — win or lose."</div>
      </div>

      <div class="card">
        <h3>GiddyUp is a tool, not a crystal ball</h3>
        <p>It hands you the analysis — the numbers, the angles, the rankings — so your pick is an informed one. But you still have to read the race: the paddock, the pace, a late jockey change, how the track's playing today. The numbers get you most of the way there. Your eyes at the track finish the job.</p>
      </div>
    `;
  },

  start(){
    return `
      <div class="taglabel">Get Started</div>
      <h2>Sign Up for GiddyUp</h2>
      <p class="sub">Takes about 30 seconds. Do it yourself, on your own phone — you'll want to get comfortable using it on your own.</p>

      <div class="steplist">
        <div class="step"><div class="num">1</div><div class="txt">Click the link below</div></div>
        <div class="step"><div class="num">2</div><div class="txt">Create your account — you can also choose a Racing Name for yourself, works well for tournaments</div></div>
      </div>

      <a class="cta" href="index.html">Back to the App →</a>

      <div class="quote" style="margin-top:24px">
        <div class="q">"We do the Numbers.<br>You enjoy the race."</div>
      </div>

      <div class="steplist">
        <div class="step"><div class="num">1</div><div class="txt">Select a Race</div></div>
        <div class="step"><div class="num">2</div><div class="txt">Go to Rankings — the horses are already analyzed and ranked</div></div>
        <div class="step"><div class="num">3</div><div class="txt">Select a preset ranking, or set up and choose your own</div></div>
        <div class="step"><div class="num">4</div><div class="txt">Read your angles and make your pick</div></div>
      </div>

      <div class="taglabel" style="margin-top:24px">One-Tap Access</div>
      <h2>Add GiddyUp to Your Home Screen</h2>
      <p class="sub">Turns it into an app icon — no typing the address every time you're at the track.</p>

      <div class="card">
        <h3>📱 iPhone (Safari)</h3>
        <p>Tap the Share icon (the square with the arrow) at the bottom of the screen, scroll down, tap "Add to Home Screen," then tap Add.</p>
      </div>
      <div class="card">
        <h3>🤖 Android (Chrome)</h3>
        <p>Tap the three-dot menu in the top right, tap "Install app," then "Create shortcut." Name it GiddyUp Silks, then tap Add.</p>
      </div>

      <div class="taglabel" style="margin-top:24px">Coming Up</div>
      <h2>Handicapping Tournament</h2>
      <p class="sub">We're gauging interest in a GiddyUp handicapping tournament at Evergreen Park.</p>

      <div class="card">
        <h3>🏆 Interested?</h3>
        <p>Open GiddyUp Play and tap the Tournament tab — one tap signs up your interest. No commitment, just letting us know you'd want in.</p>
      </div>
      <div class="card">
        <h3>What to expect (rough idea)</h3>
        <p>Compete against other players using your GiddyUp picks. Details on format are still being worked out — signing up for interest gets you first word when it's ready.</p>
      </div>

      <a class="cta" href="play.html">Open GiddyUp Play →</a>
    `;
  }
};

const ODDS_OPTIONS = ["1-5","2-5","1-1","2-1","3-1","5-1","8-1","10-1","20-1"];
function payoutFor(oddsStr){
  const [num,den] = oddsStr.split("-").map(Number);
  const profit = 2 * (num/den);
  return "PAYS $" + (profit + 2).toFixed(2);
}

let currentTab = "intro";
let currentOdds = "5-1";

function renderTabbar(){
  const bar = document.getElementById("tabbar");
  const row1 = TABS.slice(0,3);
  const row2 = TABS.slice(3,6);
  const rowHtml = (row, extraClass) =>
    `<div class="tabrow ${extraClass}">` +
    row.map(t => `<button class="tabbtn ${t.id===currentTab?'active':''}" data-tab="${t.id}">${t.label}</button>`).join("") +
    `</div>`;
  bar.innerHTML = rowHtml(row1,"row1") + rowHtml(row2,"row2");
  bar.querySelectorAll(".tabbtn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      currentTab = btn.dataset.tab;
      renderTabbar();
      renderPanel();
      window.scrollTo({top:0,behavior:"smooth"});
    });
  });
}

function renderPanel(){
  const panel = document.getElementById("panel");
  panel.innerHTML = RENDER[currentTab]();
  if(currentTab === "bets"){
    const grid = document.getElementById("oddsGrid");
    grid.innerHTML = ODDS_OPTIONS.map(o =>
      `<button class="oddsbtn ${o===currentOdds?'active':''}" data-odds="${o}">${o}</button>`
    ).join("");
    updateTote();
    grid.querySelectorAll(".oddsbtn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        currentOdds = btn.dataset.odds;
        grid.querySelectorAll(".oddsbtn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        updateTote();
      });
    });
  }
}

function updateTote(){
  document.getElementById("oddsDisplay").textContent = currentOdds;
  document.getElementById("payoutDisplay").textContent = payoutFor(currentOdds);
}

renderTabbar();
renderPanel();
</script>
</body>
</html>
