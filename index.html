const EARNINGS_CONF_THRESH={cy:3,ly:3,car:8};
const EARNINGS_PRIORS={cy:0.5,ly:0.3,car:0.2};
const EARNINGS_CAR_FLOOR=0.3;
function computeEarningsRanks(horses){
  const eps=horses.map(hr=>{
    const e=hr.earnings||{};

    return{
      number:hr.number,
      eps_cy:starts_cy>0?e.cy_earnings/starts_cy:null,
      eps_ly:starts_ly>0?e.ly_earnings/starts_ly:null,
      eps_car:starts_car>0?e.car_earnings/starts_car:null,
      starts_cy,starts_ly,starts_car

  });
  const hasAnyData=eps.some(x=>x.eps_cy!==null||x.eps_ly!==null||x.eps_car!==null);

    const conf_cy=Math.min(1,hr.starts_cy/EARNINGS_CONF_THRESH.cy);
    const conf_ly=Math.min(1,hr.starts_ly/EARNINGS_CONF_THRESH.ly);
    const conf_car=Math.min(1,hr.starts_car/EARNINGS_CONF_THRESH.car);
    // Zero out any tier with no actual data so it can't contribute (even at the floor).
    const rw_cy=hr.eps_cy!==null?EARNINGS_PRIORS.cy*conf_cy:0;
    const rw_ly=hr.eps_ly!==null?EARNINGS_PRIORS.ly*conf_ly:0;
    const rw_car=hr.eps_car!==null?EARNINGS_PRIORS.car*Math.max(conf_car,EARNINGS_CAR_FLOOR):0;

    }
    return{number:hr.number,compositeEps,eps_cy:hr.eps_cy,eps_ly:hr.eps_ly,eps_car:hr.eps_car,
      starts_cy:hr.starts_cy,starts_ly:hr.starts_ly,starts_car:hr.starts_car,
      w_cy,w_ly,w_car};
  });

  // an automatic last place -- no data means "unknown," not "worst."

}

function RaceDayCalendar({value,onChange}){
  const [open,setOpen]=useState(false);
  const initial=value?new Date(value+"T00:00:00"):new Date();
  const [viewYear,setViewYear]=useState(initial.getFullYear());
  const [viewMonth,setViewMonth]=useState(initial.getMonth());
  const [markedDates,setMarkedDates]=useState({});
  const wrapRef=useRef();

  useEffect(()=>{
    if(!open)return;
    let cancelled=false;
    const first=new Date(viewYear,viewMonth,1),last=new Date(viewYear,viewMonth+1,0);
    GiddyUpAuth.getPublishedDates(first.toLocaleDateString("en-CA"),last.toLocaleDateString("en-CA")).then(dates=>{
      if(cancelled)return;
      const m={};dates.forEach(d=>{m[d]=true;});
      setMarkedDates(m);
    }).catch(()=>{});
    return ()=>{cancelled=true;};
  },[open,viewYear,viewMonth]);

  useEffect(()=>{
    if(!open)return;
    function onDocClick(e){if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",onDocClick);
    return ()=>document.removeEventListener("mousedown",onDocClick);
  },[open]);

  function prevMonth(){if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);}
  function nextMonth(){if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);}

  const monthLabel=new Date(viewYear,viewMonth,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const firstDow=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const todayStr=new Date().toLocaleDateString("en-CA");
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  function dateStrFor(d){return viewYear+"-"+String(viewMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}

  return h("div",{ref:wrapRef,style:{position:"relative"}},
    h("button",{type:"button",onClick:()=>setOpen(o=>!o),style:{width:"100%",boxSizing:"border-box",padding:"14px 12px",background:"rgba(201,168,76,0.06)",border:"2px solid "+C.gold,borderRadius:12,fontSize:17,fontWeight:800,color:C.text,fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("span",null,value||todayStr),
      h("span",{style:{fontSize:16}},"📅")),
    open&&h("div",{style:{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,zIndex:50,background:"#fff",border:"2px solid "+C.gold,borderRadius:14,padding:14,boxShadow:"0 12px 32px rgba(0,0,0,0.18)"}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
        h("button",{type:"button",onClick:prevMonth,style:{background:"transparent",border:"none",fontSize:18,cursor:"pointer",color:C.navy,padding:"4px 10px"}},"‹"),
        h("div",{style:{fontWeight:800,fontSize:14,color:C.text}},monthLabel),
        h("button",{type:"button",onClick:nextMonth,style:{background:"transparent",border:"none",fontSize:18,cursor:"pointer",color:C.navy,padding:"4px 10px"}},"›")),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}},
        ["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>h("div",{key:d,style:{textAlign:"center",fontSize:10,fontWeight:700,color:C.muted,padding:"4px 0"}},d))),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}},
        cells.map((d,i)=>{
          if(d===null)return h("div",{key:"e"+i});
          const ds=dateStrFor(d),isSelected=ds===value,isToday=ds===todayStr,hasCard=!!markedDates[ds];
          return h("button",{key:ds,type:"button",onClick:()=>{onChange(ds);setOpen(false);},style:{position:"relative",padding:"8px 0",textAlign:"center",borderRadius:8,border:isSelected?"2px solid "+C.gold:"1px solid transparent",background:isSelected?"rgba(201,168,76,0.15)":isToday?"rgba(26,37,53,0.06)":"transparent",color:hasCard?C.gold:C.text,fontWeight:hasCard?900:600,textDecoration:hasCard?"underline":"none",fontSize:13,cursor:"pointer"}},
            d,
            hasCard&&h("div",{style:{position:"absolute",bottom:1,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:C.gold}}));
        })),
      h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:10,paddingTop:10,borderTop:"1px solid "+C.border,fontSize:11,color:C.muted}},
        h("span",{style:{color:C.gold,fontWeight:900,textDecoration:"underline"}},"5"),
        h("span",null,"= race day published"))));

function UploadTab({races,setRaces,setActiveTab,setHorses,setActiveRace,setWeights,setLocks,angleMode,silksUser}){
  const [drag,setDrag]=useState(false);
  const [status,setStatus]=useState("idle");
  const [errorMsg,setErrorMsg]=useState("");
  const [progress,setProgress]=useState("");
  const [analyzingId,setAnalyzingId]=useState(null);
  const fileRef=useRef(),cameraRef=useRef();
  // per-race "add page" refs stored as a map by race id
  const pageRefs=useRef({});

  function readFileToPage(file,callback){
    const reader=new FileReader();
    reader.onload=(e)=>{
      const dataUrl=e.target.result,base64=dataUrl.split(",")[1];
      const isPdf=file.type==="application/pdf"||file.name.toLowerCase().endsWith(".pdf");
      const mediaType=isPdf?"application/pdf":(file.type&&file.type.startsWith("image/")?file.type:"image/jpeg");
      callback({base64,mediaType,isPdf,fileName:file.name,preview:isPdf?null:dataUrl});
    };
    reader.readAsDataURL(file);
  }

  function addFiles(files){
    Array.from(files).forEach((file,i)=>{
      readFileToPage(file,(page)=>{
        setRaces(r=>{
          const raceNum=r.length+1+i;
          return[...r,{id:Date.now()+i,label:"Race "+raceNum,pages:[page],status:"ready"}];
        });
      });
    });
    setStatus("idle");
  }

  function addPageToRace(raceId,file){
    readFileToPage(file,(page)=>{
      setRaces(r=>r.map(rc=>rc.id===raceId?{...rc,pages:[...rc.pages,page],status:"ready"}:rc));
    });
  }

  function removePage(raceId,pageIdx){
    setRaces(r=>r.map(rc=>{
      if(rc.id!==raceId)return rc;
      const pages=rc.pages.filter((_,i)=>i!==pageIdx);
      return pages.length===0?null:{...rc,pages,status:"ready"};
    }).filter(Boolean).map((rc,i)=>({...rc,label:"Race "+(i+1)})));
  }

  function remove(id){
    setRaces(r=>{
      const f=r.filter(rc=>rc.id!==id);
      return f.map((rc,i)=>({...rc,label:"Race "+(i+1)}));
    });
  }

  function clearAll(){setRaces([]);setStatus("idle");setErrorMsg("");}

  function renameRace(id,newLabel){
    setRaces(r=>r.map(rc=>rc.id===id?{...rc,label:newLabel}:rc));
  }

  async function analyzeOne(race){
    if(!race||!race.pages||!race.pages.length)return;
    setAnalyzingId(race.id);
    setStatus("reading");
    setErrorMsg("");
    try{
      const pageCount=race.pages.length;
      setProgress("Reading "+race.label+(pageCount>1?" ("+pageCount+" pages)":"")+"...");

      // Build content blocks — one block per page, then one instruction text block
      const contentArr=race.pages.map(pg=>
        pg.isPdf
          ?{type:"document",source:{type:"base64",media_type:"application/pdf",data:pg.base64}}
          :{type:"image",source:{type:"base64",media_type:pg.mediaType,data:pg.base64}}
      );
      const isMulti=pageCount>1;
      const promptText=isMulti
        ?"You have been given "+pageCount+" files for the same race. One is a horse racing past performances card (DRF, Equibase, or similar). The others may include supplementary data such as speed figure reports, handicapping sheets, or other race-related documents from any provider. Use ALL files together to build the most complete and accurate picture of each horse — where hard numbers exist in any file (speed figures, jockey win %, trainer win %, pace figures etc.) prefer those over estimates. Return ONLY valid JSON: {raceType:string,raceNumber:number,postTime:string,track:string,raceDistance:string,raceConditions:string,horses:[{number,name,jockey,trainer,odds,earnings:{cy_earnings,cy_starts,ly_earnings,ly_starts,car_earnings,car_starts},stats:{speed,form,jockey,trainer,distance,track,post,class,days,weight,workouts,equipment,pedigree,style,combo,bias}}]}. raceNumber is the large race number printed on the card. postTime is the approximate post time exactly as printed (e.g. 3:15PM) or empty string. track is the track name if printed (e.g. Evergreen Park) or empty string. raceDistance is the race distance exactly as printed (e.g. '4 Furlongs' or '1 Mile') or empty string. raceConditions is the race condition/eligibility line as printed, including any abbreviation code, purse, and age/sex/weight restrictions (e.g. '(MX) MAIDEN. Purse $6,800. For Maidens, Three Years Old and Upward. Three Year Olds, 124 Lbs; Older, 124 Lbs.') or empty string. Stats 0-100."
        :"Analyze this horse racing past performance sheet. Return ONLY valid JSON: {raceType:string,raceNumber:number,postTime:string,track:string,raceDistance:string,raceConditions:string,horses:[{number,name,jockey,trainer,odds,earnings:{cy_earnings,cy_starts,ly_earnings,ly_starts,car_earnings,car_starts},stats:{speed,form,jockey,trainer,distance,track,post,class,days,weight,workouts,equipment,pedigree,style,combo,bias}}]}. raceNumber is the large race number printed on the card. postTime is the approximate post time exactly as printed (e.g. 3:15PM) or empty string. track is the track name if printed (e.g. Evergreen Park) or empty string. raceDistance is the race distance exactly as printed (e.g. '4 Furlongs' or '1 Mile') or empty string. raceConditions is the race condition/eligibility line as printed, including any abbreviation code, purse, and age/sex/weight restrictions (e.g. '(MX) MAIDEN. Purse $6,800. For Maidens, Three Years Old and Upward. Three Year Olds, 124 Lbs; Older, 124 Lbs.') or empty string. Stats 0-100.";
      contentArr.push({type:"text",text:promptText});

      const response=await fetch("https://giddyup-proxy.kleskun.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:4000,messages:[{role:"user",content:contentArr}]})});
      const data=await response.json();
      if(data.error)throw new Error(data.error.message);
      const rawText=data.content.map(c=>c.text||"").join("").trim();
      const jsonMatch=rawText.match(/\{[\s\S]*\}/);
      if(!jsonMatch)throw new Error("No JSON found in response");
      const parsed=JSON.parse(jsonMatch[0]);
      const rt=(parsed.raceType||"custom").toLowerCase().trim();
      const detectedRaceType=["stakes","allowance","claiming","maiden"].find(t=>rt.includes(t))||"custom";
      const allHorses=(parsed.horses||[]).map((hh,idx)=>({
        ...hh,
        number:parseInt(hh.number)||(idx+1),
        earnings:{cy_earnings:0,cy_starts:0,ly_earnings:0,ly_starts:0,car_earnings:0,car_starts:0,...(hh.earnings||{})},
        stats:{speed:70,form:70,jockey:70,trainer:70,distance:70,track:70,post:70,class:70,days:70,weight:70,workouts:70,equipment:70,pedigree:70,style:70,combo:70,bias:70,...(hh.stats||{})}
      }));
      if(!allHorses.length)throw new Error("No horses found.");
      setProgress("Found "+allHorses.length+" horses!");
      setProgress("Checking jockey/trainer history…");
      await Promise.all(allHorses.map(async hh=>{
        const [combo,jockeyStats,trainerStats]=await Promise.all([
          GiddyUpAuth.getComboStats(hh.trainer,hh.jockey),
          GiddyUpAuth.getJockeyStats(hh.jockey),
          GiddyUpAuth.getTrainerStats(hh.trainer)
        ]);
        if(combo){hh.stats.combo=Math.min(100,Math.round(50+combo.win_pct));hh.liveCombo=combo;}
        if(jockeyStats){hh.stats.jockey=Math.min(100,Math.round(50+jockeyStats.win_pct));hh.liveJockey=jockeyStats;}
        if(trainerStats){hh.stats.trainer=Math.min(100,Math.round(50+trainerStats.win_pct));hh.liveTrainer=trainerStats;}
      }));
     setHorses(allHorses);
      setActiveRace(detectedRaceType);
      if(angleMode!=='custom'){
        setWeights({...PRESETS[detectedRaceType]});
      } else {
        const all=(silksUser&&silksUser.customAngles)||{};
        const slot=all[detectedRaceType];
        if(slot){const filled=fillMissingFactors(slot.weights,slot.locks);setWeights(filled.weights);setLocks(filled.locks);}
      }
      setRaces(r=>r.map(rc=>rc.id===race.id?{...rc,status:"analyzed",horseCount:allHorses.length,horses:allHorses,raceType:detectedRaceType,raceNumber:parsed.raceNumber||null,postTime:parsed.postTime||"",track:parsed.track||"",raceDistance:parsed.raceDistance||"",raceConditions:parsed.raceConditions||"",label:parsed.raceNumber?("Race "+parsed.raceNumber):rc.label,active:true}:{...rc,active:false}));
      setStatus("done");
      setTimeout(()=>setActiveTab("angles"),1200);
    }catch(err){
      setStatus("error");
      setErrorMsg(err.message||"Could not read program.");
    }
    setAnalyzingId(null);
  }

  // ── PUBLISHED DAY CARD (Supabase race_cards) ──
  const [pubStatus,setPubStatus]=useState("");
  const [pubDate,setPubDate]=useState(new Date().toLocaleDateString("en-CA"));
  const [loadDate,setLoadDate]=useState(new Date().toLocaleDateString("en-CA"));
  const isAdmin=silksUser&&GIDDYUP_ADMIN_USERNAMES.includes((silksUser.username||"").toLowerCase());
  function todayStr(){return new Date().toLocaleDateString("en-CA");}

  function viewCached(race){

  async function publishTodayCard(){

    if(!analyzed.length){setPubStatus("Nothing to publish — analyze at least one race first.");return;}
    const target=pubDate||todayStr();

  async function loadTodayCard(){

    const isToday=target===todayStr();
